<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .header {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .title-icon {
            font-size: 36px;
            color: #3498db;
        }

        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 20px;
            padding: 0 20px;
            height: calc(100vh - 120px);
            max-height: 900px;
        }

        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }

        .tool-card:hover::before {
            transform: scaleX(1);
        }

        .tool-icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-name {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        /* 工具图标颜色 */
        .video-icon { color: #e74c3c; }
        .image-icon { color: #f39c12; }
        .music-icon { color: #9b59b6; }
        .file-icon { color: #f1c40f; }
        .browser-icon { color: #3498db; }
        .download-icon { color: #1abc9c; }
        .photo-icon { color: #2ecc71; }
        .record-icon { color: #e67e22; }
        .map-icon { color: #e67e22; }
        .lightning-icon { color: #f39c12; }
        .game-icon { color: #9b59b6; }
        .settings-icon { color: #34495e; }
        .speed-icon { color: #95a5a6; }
        .compiler-icon { color: #e74c3c; }
        .study-icon { color: #3498db; }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #7f8c8d;
            font-size: 12px;
            width: 100%;
            max-width: 600px;
        }

        @media (max-width: 480px) {
            .container {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                height: calc(100vh - 100px);
            }
            
            .title {
                font-size: 28px;
            }
            
            .tool-card {
                padding: 20px 12px;
                min-height: 90px;
            }
            
            .tool-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">
            <span class="title-icon">🔧</span>
            超级工具箱
        </h1>
        <p class="subtitle">一站式多功能工具平台</p>
    </div>

    <div class="container">
        <a href="a.html" class="tool-card">
            <div class="tool-icon video-icon">🎬</div>
            <div class="tool-name">视频</div>
        </a>

        <a href="b.html" class="tool-card">
            <div class="tool-icon image-icon">🖼️</div>
            <div class="tool-name">图片</div>
        </a>

        <a href="c.html" class="tool-card">
            <div class="tool-icon music-icon">🎵</div>
            <div class="tool-name">音乐</div>
        </a>

        <a href="d.html" class="tool-card">
            <div class="tool-icon file-icon">📁</div>
            <div class="tool-name">文件</div>
        </a>

        <a href="e.html" class="tool-card">
            <div class="tool-icon browser-icon">🌐</div>
            <div class="tool-name">浏览器</div>
        </a>

        <a href="f.html" class="tool-card">
            <div class="tool-icon download-icon">⬇️</div>
            <div class="tool-name">下载</div>
        </a>

        <a href="g.html" class="tool-card">
            <div class="tool-icon photo-icon">📷</div>
            <div class="tool-name">相册</div>
        </a>

        <a href="h.html" class="tool-card">
            <div class="tool-icon record-icon">🎤</div>
            <div class="tool-name">录音</div>
        </a>

        <a href="i.html" class="tool-card">
            <div class="tool-icon map-icon">🗺️</div>
            <div class="tool-name">地图</div>
        </a>

        <a href="j.html" class="tool-card">
            <div class="tool-icon lightning-icon">⚡</div>
            <div class="tool-name">雷电</div>
        </a>

        <a href="k.html" class="tool-card">
            <div class="tool-icon game-icon">🎮</div>
            <div class="tool-name">游戏</div>
        </a>

        <a href="l.html" class="tool-card">
            <div class="tool-icon settings-icon">⚙️</div>
            <div class="tool-name">设置</div>
        </a>

        <a href="m.html" class="tool-card">
            <div class="tool-icon speed-icon">👽</div>
            <div class="tool-name">速帧播放器</div>
        </a>

        <a href="n.html" class="tool-card">
            <div class="tool-icon compiler-icon">🐯</div>
            <div class="tool-name">编译器</div>
        </a>

        <a href="o.html" class="tool-card">
            <div class="tool-icon study-icon">📚</div>
            <div class="tool-name">学习工具</div>
        </a>
    </div>

    <div class="footer">
        <p>© 本源码版权↑所有，仅供学习交流。

 ➕😄➕➕😄超级工具箱 | 让看起来更简单</p>
    </div>
</body>
</html>

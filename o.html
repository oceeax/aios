// 随机打乱选项顺序
function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

const questions = raw.map(q => {
    const opts = q[1].map((text, idx) => ({ text, score: q[2][idx] }));
    const shuffled = shuffle(opts);
    return [q[0], shuffled.map(o => o.text), shuffled.map(o => o.score)];
});

// 渲染题目（无分数）
const list = document.getElementById("qlist");
questions.forEach((q, i) => {
    const d = document.createElement("div");
    d.className = "ques";
    let opts = "";
    q[1].forEach((o, j) => {
        opts += `<label class="opt"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`;
    });
    d.innerHTML = `<div class="qtitle">${i + 1}. ${q[0]}</div>${opts}`;
    list.appendChild(d);
});

// 提交判分
document.getElementById("btn").onclick = () => {
    let score = 0;
    questions.forEach((q, i) => {
        const ans = document.querySelector(`input[name="q${i}"]:checked`);
        if (ans) score += q[2][ans.value];
    });
    const level = levels.find(l => score >= l.min && score <= l.max);
    document.getElementById("rimage").src = level.img;
    document.getElementById("rt").textContent = level.title;
    document.getElementById("rd").textContent = `总分：${score}/500 | ${level.desc}`;
    document.getElementById("res").style.display = "block";

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f8f9fa;padding:30px}
        .back{position:absolute;left:15px;top:15px}
        button{background:#007bff;color:white;border:none;padding:10px 15px;border-radius:8px;cursor:pointer}
        .title{text-align:center;font-size:28px;margin:20px 0}
        .item{padding:15px;background:#fff;border-radius:10px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
        .item input{margin-left:10px}
    </style>
</head>
<body>
    <div class="back"><button onclick="location.href='/aios/'">← 返回主页</button></div>
    <div class="title">⚙️ 设置</div>

    <div class="item">夜间模式 <input type="checkbox"></div>
    <div class="item">通知 <input type="checkbox" checked></div>
    <div class="item">清理缓存 <button onclick="alert('已清理')">清理</button></div>
    <div class="item">关于我们 <button onclick="alert('全能工具箱 v1.0')">查看</button></div>
</body>
</html>

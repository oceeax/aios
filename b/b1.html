<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调用相册</title>
</head>
<body>
    <!-- 隐藏的文件选择控件，负责唤起系统相册 -->
    <input type="file" id="albumInput" accept="image/*" multiple style="display: none;">

    <!-- 点击这个按钮就能唤起相册 -->
    <button onclick="document.getElementById('albumInput').click()">打开本机相册</button>
</body>
</html>

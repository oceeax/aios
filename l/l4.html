<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷新</title>

<style>
body{text-align:center;font-family:system-ui;background:#f3f3f3;}
button{padding:12px;margin:8px;border-radius:10px;background:#444;color:#fff;border:none;}
</style>
</head>

<body>

<button onclick="back()">←返回</button>
<h3>刷新功能</h3>

<button onclick="normal()">普通刷新</button>
<button onclick="hard()">强制刷新</button>
<button onclick="auto()">自动刷新</button>
<button onclick="timer()">定时刷新（5秒）</button>

<script>
function back(){location.href="../index.html"}

function normal(){location.reload();}
function hard(){location.href=location.href;}

let t;

function auto(){
    clearInterval(t);
    t=setInterval(()=>location.reload(),2000);
}

function timer(){
    setTimeout(()=>location.reload(),5000);
}
</script>

</body>
</html>

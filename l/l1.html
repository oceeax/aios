<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意见反馈系统</title>
<style>
*{box-sizing:border-box;font-family:微软雅黑}
body{background:#f5f7fa;padding:20px;max-width:700px;margin:0 auto}
.box{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
h3{margin-bottom:12px}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px}
textarea{height:110px;resize:none}
button{padding:10px 16px;background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-orange{background:#ff9800;margin-left:6px}
.feedback-item{padding:12px 0;border-bottom:1px solid #eee}
.time{font-size:12px;color:#999}
.reply{color:#007bff;margin-top:6px;font-weight:bold}
.code-display{margin-top:12px;font-weight:bold;color:#ff5722}
</style>
</head>
<body>

<div class="box">
  <h3>提交反馈</h3>
  <input id="nickname" placeholder="昵称（必填）">
  <input id="email" placeholder="邮箱（选填）">
  <input id="code" placeholder="6位提取码，不填自动生成">
  <textarea id="content" placeholder="反馈内容"></textarea>
  <button onclick="submit()">提交反馈</button>
  <button class="btn-orange" onclick="showTip()">数据提示</button>
</div>

<div class="box">
  <h3>我的反馈记录</h3>
  <div id="myList"></div>
  <div id="codeDisplay" class="code-display"></div>
</div>

<script>
// 已填入你的腾讯文档
const SHEET_ID = "DTUpWSHBWbkJzdmRP";
const SHEET_URL = "https://docs.qq.com/sheet/" + SHEET_ID;

// 生成6位提取码
function genCode() {
  return String(Math.floor(100000 + Math.random() * 900000));
}

// 提交反馈
function submit() {
  let nickname = document.getElementById("nickname").value.trim();
  let email = document.getElementById("email").value.trim();
  let code = document.getElementById("code").value.trim();
  let content = document.getElementById("content").value.trim();

  if (!nickname || !content) {
    alert("请填写昵称和反馈内容");
    return;
  }

  if (!code) {
    code = genCode();
  }
  if (code.length !== 6 || isNaN(Number(code))) {
    alert("提取码必须是6位数字");
    return;
  }

  // 保存当前提取码
  localStorage.setItem("userCode", code);

  // 保存到本地（后续可对接腾讯文档API）
  let list = JSON.parse(localStorage.getItem("feedbacks")) || [];
  list.unshift({
    code,
    nickname,
    email,
    content,
    time: new Date().toLocaleString(),
    reply: ""
  });
  localStorage.setItem("feedbacks", JSON.stringify(list));

  alert("提交成功！\n你的提取码：" + code);
  document.getElementById("nickname").value = "";
  document.getElementById("email").value = "";
  document.getElementById("code").value = "";
  document.getElementById("content").value = "";
  loadMyList();
}

// 加载自己的记录
function loadMyList() {
  let code = localStorage.getItem("userCode");
  if (!code) return;

  let all = JSON.parse(localStorage.getItem("feedbacks")) || [];
  let my = all.filter(item => item.code === code);

  let html = my.map(item => `
  <div class="feedback-item">
    <div class="time">${item.time}｜${item.nickname}</div>
    <div>${item.content}</div>
    ${item.reply ? `<div class="reply">管理员回复：${item.reply}</div>` : ''}
  </div>
  `).join("");

  document.getElementById("myList").innerHTML = html || "暂无记录";
  document.getElementById("codeDisplay").innerText = "你的提取码为：" + code;
}

// 数据提示
function showTip() {
  alert("温馨提示：本系统数据同步至网络，使用6位提取码识别用户。更换手机后，输入相同提取码即可查看本人全部历史反馈记录，提取码请妥善保管。");
}

// 初始化
loadMyList();
</script>
</body>
</html>

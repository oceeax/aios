<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{text-align:center;font-family:system-ui;background:#f3f3f3;}
.top{padding:15px;}
input{width:80%;padding:10px;margin:8px;border-radius:10px;}
button{padding:10px 20px;border-radius:10px;}
</style>
</head>

<body>

<div class="top">
<button onclick="back()">←返回</button>
<h2>二维码生成（4种）</h2>

<input id="text" placeholder="文本">
<input id="url" placeholder="网址">
<input id="wifi" placeholder="WiFi格式">
<input id="emoji" placeholder="表情 😎🔥❤️">

<button onclick="gen()">生成</button>

<div id="q"></div>
</div>

<script>
function back(){location.href="../index.html"}

function gen(){
    let val =
        document.getElementById("text").value ||
        document.getElementById("url").value ||
        document.getElementById("wifi").value ||
        document.getElementById("emoji").value;

    document.getElementById("q").innerHTML="";

    QRCode.toCanvas(val,{width:200},(e,c)=>{
        document.getElementById("q").appendChild(c);
    });
}
</script>

</body>
</html>

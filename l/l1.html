<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意见反馈系统</title>
<style>
*{box-sizing:border-box;font-family:微软雅黑}
body{background:#f5f7fa;padding:20px;max-width:700px;margin:0 auto}
.box{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
h3{font-size:16px;margin-bottom:12px;color:#333}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px}
textarea{height:110px;resize:none}
button{padding:10px 16px;background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-right:6px}
.btn-gray{background:#6c757d}
.btn-green{background:#28a745}
.btn-red{background:#dc3545}
.feedback-item{padding:12px 0;border-bottom:1px solid #f2f2f2}
.time{font-size:12px;color:#999}
.reply{color:#007bff;margin-top:6px;font-weight:bold}
select{padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px}
</style>
</head>
<body>

<!-- 1. 提交反馈（昵称必填、邮箱选填） -->
<div class="box">
  <h3>提交反馈</h3>
  <input type="text" id="nickname" placeholder="你的昵称（必填）">
  <input type="text" id="email" placeholder="邮箱（选填，方便接收回复通知）">
  <textarea id="content" placeholder="请输入你的反馈内容"></textarea>
  <button onclick="submitFeedback()">提交反馈</button>
</div>

<!-- 2. 本人反馈记录 -->
<div class="box">
  <h3>本人反馈记录</h3>
  <div id="myRecord"></div>
</div>

<!-- 3. 管理员修改密码 -->
<div class="box">
  <h3>管理员修改密码</h3>
  <input type="password" id="oldPwd" placeholder="原密码">
  <input type="password" id="newPwd" placeholder="新密码">
  <input type="password" id="confirmPwd" placeholder="确认新密码">
  <button class="btn-green" onclick="changePwd()">修改密码</button>
  <button class="btn-gray" onclick="showAdminLogin()">进入管理员面板</button>
</div>

<!-- 管理员登录框 -->
<div class="box" id="adminLoginBox" style="display:none">
  <h3>管理员登录</h3>
  <input type="password" id="adminLoginPwd" placeholder="输入管理员密码">
  <button onclick="adminLogin()">登录</button>
</div>

<!-- 管理员面板 -->
<div class="box" id="adminPanel" style="display:none">
  <h3>管理员管理面板</h3>
  <!-- 按昵称筛选 -->
  <select id="filterNickname" onchange="filterByNickname()">
    <option value="">全部反馈</option>
  </select>
  <div id="adminList"></div>
</div>

<script>
// ========= 这里改成你的管理员邮箱 =========
const ADMIN_EMAIL = "oscvea@yeah.net";
// ==========================================

// 初始密码
const DEFAULT_PWD = "123456";
// 生成用户唯一ID
let uid = localStorage.getItem("uid") || Math.random().toString(36).slice(2);
localStorage.setItem("uid", uid);

// 读取/保存数据
function getData(){
  return JSON.parse(localStorage.getItem("feedbacks") || "[]");
}
function saveData(arr){
  localStorage.setItem("feedbacks", JSON.stringify(arr));
}
function getAdminPwd(){
  return localStorage.getItem("admin_pwd") || DEFAULT_PWD;
}

// 提交反馈
function submitFeedback(){
  let nickname = document.getElementById("nickname").value.trim();
  let email = document.getElementById("email").value.trim();
  let content = document.getElementById("content").value.trim();
  if(!nickname) return alert("请输入昵称！");
  if(!content) return alert("请输入反馈内容！");

  let list = getData();
  list.unshift({
    uid, nickname, email, content,
    time: new Date().toLocaleString(),
    reply: ""
  });
  saveData(list);
  alert("提交成功！");
  document.getElementById("nickname").value = "";
  document.getElementById("email").value = "";
  document.getElementById("content").value = "";
  loadMyRecord();
}

// 加载本人反馈记录
function loadMyRecord(){
  let list = getData();
  let my = list.filter(i => i.uid === uid);
  let html = "";
  my.forEach(i => {
    html += `
    <div class="feedback-item">
      <div class="time">${i.time} ｜ ${i.nickname}</div>
      <div>${i.content}</div>
      ${i.reply ? `<div class="reply">管理员回复：${i.reply}</div>` : "<div style='color:#999'>等待管理员回复...</div>"}
    </div>`;
  });
  document.getElementById("myRecord").innerHTML = html || "暂无反馈记录";
}

// 修改管理员密码
function changePwd(){
  let old = document.getElementById("oldPwd").value;
  let newP = document.getElementById("newPwd").value;
  let confirm = document.getElementById("confirmPwd").value;

  if(old !== getAdminPwd()) return alert("原密码错误！");
  if(!newP) return alert("请输入新密码！");
  if(newP !== confirm) return alert("两次输入的密码不一致！");

  localStorage.setItem("admin_pwd", newP);
  alert("密码修改成功！");
  document.getElementById("oldPwd").value = "";
  document.getElementById("newPwd").value = "";
  document.getElementById("confirmPwd").value = "";
}

// 显示管理员登录框
function showAdminLogin(){
  document.getElementById("adminLoginBox").style.display = "block";
}

// 管理员登录验证
function adminLogin(){
  let pwd = document.getElementById("adminLoginPwd").value;
  if(pwd !== getAdminPwd()) return alert("密码错误！");
  document.getElementById("adminLoginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "block";
  loadAdminPanel();
}

// 加载管理员面板（昵称筛选+全部列表）
function loadAdminPanel(){
  let list = getData();
  // 填充昵称筛选下拉框
  let nicknames = [...new Set(list.map(i => i.nickname))];
  let selectHtml = `<option value="">全部反馈</option>`;
  nicknames.forEach(n => {
    selectHtml += `<option value="${n}">${n}</option>`;
  });
  document.getElementById("filterNickname").innerHTML = selectHtml;
  // 渲染全部列表
  renderAdminList(list);
}

// 按昵称筛选
function filterByNickname(){
  let list = getData();
  let selectedNick = document.getElementById("filterNickname").value;
  let filtered = selectedNick ? list.filter(i => i.nickname === selectedNick) : list;
  renderAdminList(filtered);
}

// 渲染管理员列表
function renderAdminList(list){
  let html = "";
  list.forEach((i, idx) => {
    html += `
    <div class="feedback-item">
      <div class="time">${i.time} ｜ 昵称：${i.nickname} ${i.email?"｜邮箱："+i.email:""}</div>
      <div>反馈内容：${i.content}</div>
      <input style="margin-top:6px" placeholder="输入回复内容" id="reply_${idx}" value="${i.reply}">
      <button style="margin-top:6px" onclick="saveReply(${idx})">保存回复</button>
      ${i.reply ? `<div class="reply" style="margin-top:6px">已回复：${i.reply}</div>` : ""}
    </div>`;
  });
  document.getElementById("adminList").innerHTML = html || "暂无反馈";
}

// 保存回复 + 自动发邮件给管理员
function saveReply(index){
  let list = getData();
  let replyText = document.getElementById(`reply_${index}`).value.trim();
  if(!replyText) return alert("请输入回复内容！");
  
  list[index].reply = replyText;
  saveData(list);

  // 自动发邮件到管理员邮箱
  let item = list[index];
  let subject = `新回复 - ${item.nickname} 的反馈`;
  let body = 
`昵称：${item.nickname}
邮箱：${item.email || "未填写"}
反馈内容：${item.content}
管理员回复：${replyText}
回复时间：${new Date().toLocaleString()}`;

  window.location.href = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

  alert("回复已保存，同时将发送邮件通知管理员！");
  // 刷新列表
  filterByNickname();
  loadMyRecord();
}

// 初始化
window.onload = function(){
  loadMyRecord();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码工坊</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0c1117;
    --fg: #e4e8f0;
    --muted: #556070;
    --accent: #f59e0b;
    --accent2: #ef4444;
    --card: rgba(18, 26, 38, 0.9);
    --border: rgba(245, 158, 11, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 700px 500px at 10% 20%, rgba(245,158,11,0.06), transparent),
      radial-gradient(ellipse 500px 400px at 90% 80%, rgba(239,68,68,0.04), transparent);
  }

  .noise-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto; padding: 40px 20px;
  }

  header { text-align: center; margin-bottom: 40px; }

  header h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  header p { color: var(--muted); font-size: 15px; font-weight: 200; }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(20px);
  }

  .panel-title {
    font-size: 13px; font-weight: 700;
    color: var(--accent); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }

  .panel-title i { font-size: 14px; }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block; font-size: 12px; color: var(--muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  textarea.input-area {
    width: 100%; padding: 12px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg); font-family: 'Outfit', sans-serif;
    font-size: 14px; outline: none; resize: vertical;
    min-height: 90px;
    transition: border-color 0.3s;
  }

  textarea.input-area:focus { border-color: var(--accent); }

  .input-row {
    display: flex; gap: 10px; align-items: center;
  }

  .input-field {
    flex: 1; padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg); font-family: 'Outfit', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.3s;
  }

  .input-field:focus { border-color: var(--accent); }

  select.input-field { cursor: pointer; }

  .color-pick-row {
    display: flex; gap: 12px; align-items: center;
  }

  .color-pick-item {
    flex: 1; display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px; border: 1px solid var(--border);
  }

  .color-pick-item label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  input[type="color"] {
    width: 32px; height: 32px; border: none;
    background: none; cursor: pointer; border-radius: 6px;
  }

  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 22px; border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
    border: none; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 100%;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }

  .btn-primary:hover { box-shadow: 0 4px 24px rgba(245,158,11,0.3); }

  .btn-outline {
    background: transparent; border: 1px solid var(--border); color: var(--fg);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-sm { padding: 8px 16px; font-size: 12px; width: auto; }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  /* 预览区 */
  .preview-area {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 320px;
  }

  .qr-wrapper {
    padding: 20px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  .qr-wrapper.pop {
    animation: qr-pop 0.4s ease;
  }

  @keyframes qr-pop {
    0% { transform: scale(0.8); opacity: 0.5; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  #qrContainer img, #qrContainer canvas {
    display: block !important;
    border-radius: 4px;
  }

  .qr-placeholder {
    color: var(--muted); font-size: 14px; text-align: center;
    padding: 60px 20px;
  }

  .qr-placeholder i { font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.3; }

  .preview-actions {
    margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }

  /* 预设模板 */
  .preset-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
  }

  .preset-item {
    padding: 10px; text-align: center;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    font-size: 12px; color: var(--fg);
    transition: all 0.2s;
  }

  .preset-item:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .preset-item i { display: block; font-size: 18px; margin-bottom: 4px; }

  /* 历史记录 */
  .history-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 10px;
  }

  .history-item {
    aspect-ratio: 1;
    background: #fff; border-radius: 8px; padding: 6px;
    cursor: pointer; position: relative;
    transition: transform 0.2s; overflow: hidden;
  }

  .history-item:hover { transform: scale(1.05); }

  .history-item img { width: 100%; height: 100%; object-fit: contain; }

  .history-item .history-del {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(239,68,68,0.9); color: #fff;
    font-size: 10px; display: none;
    align-items: center; justify-content: center;
    cursor: pointer; border: none;
  }

  .history-item:hover .history-del { display: flex; }

  /* 字符计数 */
  .char-count {
    text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px;
  }

  .char-count.warn { color: var(--accent); }
  .char-count.danger { color: var(--accent2); }

  /* 信息行 */
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 13px;
  }

  .info-row .label { color: var(--muted); }
  .info-row .value { color: var(--fg); font-weight: 700; }

  /* toast */
  .toast-container {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }

  .toast {
    padding: 12px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px; font-size: 13px;
    backdrop-filter: blur(20px);
    animation: toast-in 0.3s ease, toast-out 0.3s ease 2.7s forwards;
    display: flex; align-items: center; gap: 8px;
  }

  @keyframes toast-in { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toast-out { to { opacity: 0; transform: translateX(40px); } }

  .fade-in {
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .section-gap { margin-top: 24px; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="noise-overlay"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <header class="fade-in">
    <h1>二维码工坊</h1>
    <p>输入任意内容 / URL / 文本 / WiFi 信息，即时生成二维码</p>
  </header>

  <div class="main-grid">
    <!-- 左侧：输入与设置 -->
    <div>
      <div class="panel fade-in">
        <div class="panel-title"><i class="fa-solid fa-keyboard"></i> 内容输入</div>
        <div class="form-group">
          <textarea class="input-area" id="qrInput" placeholder="输入 URL、文本、或任意内容..." oninput="updateCharCount()">https://example.com</textarea>
          <div class="char-count" id="charCount">15 / 2953 字符</div>
        </div>

        <!-- 快捷预设 -->
        <div class="form-group">
          <div class="form-label">快捷模板</div>
          <div class="preset-grid">
            <div class="preset-item" onclick="applyPreset('url')">
              <i class="fa-solid fa-link"></i> URL
            </div>
            <div class="preset-item" onclick="applyPreset('wifi')">
              <i class="fa-solid fa-wifi"></i> WiFi
            </div>
            <div class="preset-item" onclick="applyPreset('email')">
              <i class="fa-solid fa-envelope"></i> 邮件
            </div>
            <div class="preset-item" onclick="applyPreset('tel')">
              <i class="fa-solid fa-phone"></i> 电话
            </div>
            <div class="preset-item" onclick="applyPreset('sms')">
              <i class="fa-solid fa-comment-sms"></i> 短信
            </div>
            <div class="preset-item" onclick="applyPreset('vcard')">
              <i class="fa-solid fa-address-card"></i> 名片
            </div>
            <div class="preset-item" onclick="applyPreset('geo')">
              <i class="fa-solid fa-location-dot"></i> 地理
            </div>
            <div class="preset-item" onclick="applyPreset('text')">
              <i class="fa-solid fa-align-left"></i> 文本
            </div>
          </div>
        </div>

        <!-- 生成按钮 -->
        <button class="btn btn-primary" onclick="generateQR()" style="margin-bottom:16px;">
          <i class="fa-solid fa-qrcode"></i> 生成二维码
        </button>

        <!-- 样式设置 -->
        <div class="panel-title" style="margin-top:8px;"><i class="fa-solid fa-palette"></i> 样式设置</div>

        <div class="form-group">
          <div class="form-label">颜色</div>
          <div class="color-pick-row">
            <div class="color-pick-item">
              <label>前景</label>
              <input type="color" id="fgColor" value="#000000">
            </div>
            <div class="color-pick-item">
              <label>背景</label>
              <input type="color" id="bgColor" value="#ffffff">
            </div>
            <button class="btn btn-outline btn-sm" onclick="swapColors()" title="交换颜色">
              <i class="fa-solid fa-right-left"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <div class="form-label">尺寸</div>
          <div class="input-row">
            <input type="range" id="qrSize" min="100" max="600" value="256" style="flex:1;accent-color:var(--accent);">
            <span id="sizeLabel" style="color:var(--muted);font-size:13px;min-width:50px;text-align:right;">256px</span>
          </div>
        </div>

        <div class="form-group">
          <div class="form-label">纠错级别</div>
          <select class="input-field" id="ecLevel">
            <option value="L">L — 低 (7%)</option>
            <option value="M" selected>M — 中 (15%)</option>
            <option value="Q">Q — 较高 (25%)</option>
            <option value="H">H — 高 (30%)</option>
          </select>
        </div>

        <!-- 二维码信息 -->
        <div id="qrInfo" style="display:none;">
          <div class="panel-title" style="margin-top:8px;"><i class="fa-solid fa-circle-info"></i> 二维码信息</div>
          <div class="info-row"><span class="label">内容长度</span><span class="value" id="infoLen">--</span></div>
          <div class="info-row"><span class="label">纠错级别</span><span class="value" id="infoEC">--</span></div>
          <div class="info-row"><span class="label">输出尺寸</span><span class="value" id="infoSize">--</span></div>
          <div class="info-row"><span class="label">模块数</span><span class="value" id="infoModules">--</span></div>
        </div>
      </div>
    </div>

    <!-- 右侧：预览与下载 -->
    <div>
      <div class="panel fade-in" style="animation-delay:0.1s;">
        <div class="panel-title"><i class="fa-solid fa-eye"></i> 实时预览</div>
        <div class="preview-area">
          <div id="qrPlaceholder" class="qr-placeholder">
            <i class="fa-solid fa-qrcode"></i>
            点击"生成二维码"或直接输入内容
          </div>
          <div id="qrWrapper" class="qr-wrapper" style="display:none;">
            <div id="qrContainer"></div>
          </div>
        </div>
        <div class="preview-actions" id="previewActions" style="display:none;">
          <button class="btn btn-outline btn-sm" onclick="downloadPNG()">
            <i class="fa-solid fa-image"></i> 下载 PNG
          </button>
          <button class="btn btn-outline btn-sm" onclick="downloadSVG()">
            <i class="fa-solid fa-file-code"></i> 下载 SVG
          </button>
          <button class="btn btn-outline btn-sm" onclick="copyToClipboard()">
            <i class="fa-solid fa-copy"></i> 复制图片
          </button>
        </div>
      </div>

      <!-- 历史记录 -->
      <div class="panel fade-in section-gap" style="animation-delay:0.2s;">
        <div class="panel-title">
          <i class="fa-solid fa-clock-rotate-left"></i> 历史记录
          <button class="btn btn-outline btn-sm" onclick="clearHistory()" style="margin-left:auto;">
            <i class="fa-solid fa-trash"></i> 清空
          </button>
        </div>
        <div class="history-grid" id="historyGrid">
          <div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:20px;">
            暂无历史记录
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let qrInstance = null;
  let currentQRData = null;
  const history = [];

  // ====== 工具 ======
  function toast(msg, icon) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<i class="fa-solid fa-${icon || 'circle-check'}" style="color:var(--accent)"></i> ${msg}`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function updateCharCount() {
    const len = document.getElementById('qrInput').value.length;
    const el = document.getElementById('charCount');
    el.textContent = `${len} / 2953 字符`;
    el.className = 'char-count' + (len > 2500 ? ' danger' : len > 2000 ? ' warn' : '');
  }

  // ====== 预设模板 ======
  const presets = {
    url: 'https://example.com',
    wifi: 'WIFI:T:WPA;S:MyNetwork;P:MyPassword;;',
    email: 'mailto:user@example.com?subject=Hello&body=Hi there!',
    tel: 'tel:+8613800138000',
    sms: 'smsto:+8613800138000:Hello from QR Code!',
    vcard: 'BEGIN:VCARD\nVERSION:3.0\nN:张;三\nFN:张三\nTEL:+8613800138000\nEMAIL:zhangsan@example.com\nEND:VCARD',
    geo: 'geo:39.9042,116.4074',
    text: '这是一段示例文本，扫描二维码即可阅读。'
  };

  function applyPreset(key) {
    document.getElementById('qrInput').value = presets[key];
    updateCharCount();
    const names = { url:'URL', wifi:'WiFi', email:'邮件', tel:'电话', sms:'短信', vcard:'名片', geo:'地理位置', text:'文本' };
    toast(`已加载${names[key]}模板`, 'wand-magic-sparkles');
  }

  function swapColors() {
    const fg = document.getElementById('fgColor');
    const bg = document.getElementById('bgColor');
    const tmp = fg.value;
    fg.value = bg.value;
    bg.value = tmp;
  }

  // 尺寸滑块
  document.getElementById('qrSize').addEventListener('input', function() {
    document.getElementById('sizeLabel').textContent = this.value + 'px';
  });

  // ====== 生成二维码 ======
  function generateQR() {
    const text = document.getElementById('qrInput').value.trim();
    if (!text) { toast('请输入内容', 'triangle-exclamation'); return; }

    const fgColor = document.getElementById('fgColor').value;
    const bgColor = document.getElementById('bgColor').value;
    const size = parseInt(document.getElementById('qrSize').value);
    const ecLevel = document.getElementById('ecLevel').value;

    // 清除旧的
    const container = document.getElementById('qrContainer');
    container.innerHTML = '';

    // 纠错级别映射
    const ecMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };

    try {
      qrInstance = new QRCode(container, {
        text: text,
        width: size,
        height: size,
        colorDark: fgColor,
        colorLight: bgColor,
        correctLevel: ecMap[ecLevel]
      });

      currentQRData = { text, fgColor, bgColor, size, ecLevel };

      // 显示预览
      document.getElementById('qrPlaceholder').style.display = 'none';
      const wrapper = document.getElementById('qrWrapper');
      wrapper.style.display = 'block';
      wrapper.style.background = bgColor;
      wrapper.classList.remove('pop');
      void wrapper.offsetWidth; // 触发重绘
      wrapper.classList.add('pop');

      document.getElementById('previewActions').style.display = 'flex';

      // 信息
      const canvas = container.querySelector('canvas');
      const modules = canvas ? Math.round(Math.sqrt(canvas.width * canvas.height / ((size / Math.sqrt(text.length * 8 + 50)) ** 2 || 1))) : '--';
      document.getElementById('qrInfo').style.display = 'block';
      document.getElementById('infoLen').textContent = text.length + ' 字符';
      document.getElementById('infoEC').textContent = ecLevel;
      document.getElementById('infoSize').textContent = size + ' x ' + size + ' px';
      document.getElementById('infoModules').textContent = modules > 0 && modules < 300 ? modules + ' x ' + modules : '自动';

      // 加入历史
      addToHistory(text, canvas || container.querySelector('img'));

      toast('二维码生成成功', 'check');
    } catch (e) {
      toast('生成失败：内容可能过长', 'triangle-exclamation');
      console.error(e);
    }
  }

  // ====== 下载 ======
  function getCanvas() {
    const container = document.getElementById('qrContainer');
    let canvas = container.querySelector('canvas');
    if (!canvas) {
      // 从 img 创建 canvas
      const img = container.querySelector('img');
      if (!img) return null;
      canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth || img.width;
      canvas.height = img.naturalHeight || img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
    }
    return canvas;
  }

  function downloadPNG() {
    const canvas = getCanvas();
    if (!canvas) { toast('没有可下载的二维码', 'triangle-exclamation'); return; }
    const a = document.createElement('a');
    a.download = 'qrcode_' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    toast('PNG 已下载', 'download');
  }

  function downloadSVG() {
    const canvas = getCanvas();
    if (!canvas) { toast('没有可导出的二维码', 'triangle-exclamation'); return; }
    const size = canvas.width;
    const ctx = canvas.getContext('2d');
    const data = ctx.getImageData(0, 0, size, size).data;
    const moduleSize = 10; // 假设最小模块大小
    // 简化 SVG：逐像素生成（实际应分析模块边界）
    const bgColor = currentQRData ? currentQRData.bgColor : '#ffffff';
    const fgColor = currentQRData ? currentQRData.fgColor : '#000000';
    let rects = '';
    // 采样：每 moduleSize 像素取一个
    const step = Math.max(1, Math.round(size / 100));
    for (let y = 0; y < size; y += step) {
      for (let x = 0; x < size; x += step) {
        const i = (y * size + x) * 4;
        const r = data[i], g = data[i+1], b = data[i+2];
        // 判断是否为前景色
        const isDark = (r + g + b) < 384;
        if (isDark) {
          rects += `<rect x="${x}" y="${y}" width="${step}" height="${step}" fill="${fgColor}"/>`;
        }
      }
    }
    const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
<rect width="100%" height="100%" fill="${bgColor}"/>
${rects}
</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.download = 'qrcode_' + Date.now() + '.svg';
    a.href = URL.createObjectURL(blob);
    a.click();
    URL.revokeObjectURL(a.href);
    toast('SVG 已下载', 'download');
  }

  async function copyToClipboard() {
    const canvas = getCanvas();
    if (!canvas) { toast('没有可复制的二维码', 'triangle-exclamation'); return; }
    try {
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      toast('已复制到剪贴板', 'clipboard-check');
    } catch (e) {
      toast('复制失败，请手动右键保存', 'triangle-exclamation');
    }
  }

  // ====== 历史记录 ======
  function addToHistory(text, source) {
    // 从 canvas/img 生成缩略图
    let thumbUrl;
    if (source.tagName === 'CANVAS') {
      thumbUrl = source.toDataURL('image/png');
    } else if (source.tagName === 'IMG') {
      thumbUrl = source.src;
    } else return;

    history.unshift({ text, thumbUrl, time: Date.now() });
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const grid = document.getElementById('historyGrid');
    if (history.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:20px;">暂无历史记录</div>';
      return;
    }
    grid.innerHTML = history.map((item, i) => `
      <div class="history-item" onclick="restoreHistory(${i})" title="${item.text.substring(0, 50)}">
        <img src="${item.thumbUrl}" alt="QR">
        <button class="history-del" onclick="event.stopPropagation();removeHistory(${i})"><i class="fa-solid fa-xmark"></i></button>
      </div>
    `).join('');
  }

  function restoreHistory(idx) {
    const item = history[idx];
    document.getElementById('qrInput').value = item.text;
    updateCharCount();
    toast('已恢复历史记录', 'clock-rotate-left');
  }

  function removeHistory(idx) {
    history.splice(idx, 1);
    renderHistory();
  }

  function clearHistory() {
    history.length = 0;
    renderHistory();
    toast('历史记录已清空', 'trash');
  }

  // ====== 初始化 ======
  updateCharCount();

  // 回车生成
  document.getElementById('qrInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      generateQR();
    }
  });
</script>
</body>
</html>

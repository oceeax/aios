<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>明文输入-密文CSV验证</title>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<style>
body{background:#111;color:#fff;text-align:center;padding-top:100px;}
input{padding:12px;width:300px;border:none;border-radius:4px;font-size:16px;}
button{padding:12px 28px;background:#2563eb;border:0;color:#fff;border-radius:4px;margin-left:8px;}
.tip{margin-top:30px;font-size:18px;}
</style>
</head>
<body>

<input id="userPwd" placeholder="输入你的明文密码">
<button onclick="verify()">确认验证</button>
<div class="tip" id="tip"></div>

<script>
// ========= 固定密钥 不要改 =========
const KEY = CryptoJS.enc.Utf8.parse("9s7d2k8g5h1j3p6q");
const IV  = CryptoJS.enc.Utf8.parse("a1s2d3f4g5h6j7k8");

// ========= 在这里添加多个加密CSV文件 =========
const csvList = [
  "./pwd1.csv",
  "./pwd2.csv",
  "./vip.csv"
];

// 存放所有CSV里的密文
let cipherLib = [];

// AES 加密函数（和你加密器完全一致）
function plainToCipher(plain){
  let src = CryptoJS.enc.Utf8.parse(plain.trim());
  return CryptoJS.AES.encrypt(src, KEY, {
    iv: IV,
    mode: CryptoJS.mode.CBC,
    padding: CryptoJS.pad.Pkcs7
  }).toString();
}

// 批量加载多个加密CSV
async function loadEncryptCsv(){
  try{
    for(let file of csvList){
      const res = await fetch(file);
      const text = await res.text();
      const rows = text.split("\n")
                       .map(v=>v.trim())
                       .filter(v=>v);
      cipherLib = cipherLib.concat(rows);
    }
    console.log("密文库加载完成，总数：", cipherLib.length);
  }catch(e){
    tip.innerText = "密码库加载失败";
    tip.style.color = "red";
  }
}

// 验证核心
function verify(){
  let inputPlain = document.getElementById("userPwd").value.trim();
  // 用户输入的明文 → 加密成密文
  let inputCipher = plainToCipher(inputPlain);
  // 和CSV里的密文对比
  if(cipherLib.includes(inputCipher)){
    tip.innerText = "✅ 解锁成功";
    tip.style.color = "#34d399";
  }else{
    tip.innerText = "❌ 密码错误";
    tip.style.color = "#f87171";
  }
}

// 页面自动加载全部加密CSV
loadEncryptCsv();
</script>
</body>
</html>
